      <stop offset="1" stop-color="#5b51c4"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7be0c0" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#9c7bff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff9ec4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3f5ff"/>
      <stop offset="1" stop-color="#c4c9f4"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0" y1="0" x2="0" y2="1">
